name: Publish Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          release_tag="${{ inputs.tag }}"
          if [ -z "$release_tag" ]; then
            release_tag="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$release_tag" ]; then
            echo "::error::Missing release tag input."
            exit 1
          fi
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release tag '$release_tag'. Expected v<major>.<minor>.<patch>."
            exit 1
          fi
          echo "value=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Check out tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.release_tag.outputs.value }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Check PyPI token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${PYPI_API_TOKEN}" ]; then
            echo "::error::Missing PYPI_API_TOKEN secret."
            exit 1
          fi

      - name: Build distributions
        run: |
          rm -rf dist
          uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          UV_PUBLISH_CHECK_URL: https://pypi.org/simple/
        run: uv publish dist/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --verify-tag
          fi
