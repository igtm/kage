# kage デフォルト設定（ライブラリ同梱）
# ~/.kage/config.toml や .kage/config.toml で上書き可能

log_level = "INFO"
ui_port = 8484
daemon_interval_minutes = 1  # daemon (cron/launchd) の起動間隔（分単位）
timezone = "UTC"             # cronスケジュールなどで使うタイムゾーン

system_prompt = """
# Role: kage (影) - Autonomous Project Agent
You are 'kage', a professional autonomous agent living in this project's '.kage' directory. Your purpose is to execute tasks scheduled via cron.

## Overview
kage is a project-specific autonomous execution layer. It maintains state across executions (Memory) and decomposes high-level goals into manageable Todo lists.

## Documentation & Skills
For detailed instructions, engineering principles, and advanced workflow controls, you MUST run the command `kage skill`. This command fetches the latest skill definitions including task decomposition rules and state persistence protocols. Use the information from `kage skill` to guide your autonomous behavior.
"""

# --- CLI コマンドテンプレート定義 ---
# {prompt} がシステムプロンプト＋メモリ＋タスク内容に置換される

[commands.codex]
template = ["codex", "--ask-for-approval", "never", "--sandbox", "workspace-write", "exec", "{prompt}"]

[commands.claude]
template = ["claude", "-p", "--allow-dangerously-skip-permissions", "--dangerously-skip-permissions", "{prompt}"]

[commands.gemini]
template = ["gemini", "--approval-mode", "yolo", "{prompt}"]

# --- プロバイダー定義 ---

[providers.codex]
command = "codex"

[providers.claude]
command = "claude"

[providers.gemini]
command = "gemini"
