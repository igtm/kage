# ================================================================
#  kage タスク定義サンプル (Fully Loaded)
# ================================================================
# 
# --- [Pattern 1] AIプロンプト（基本） ---
# 最もシンプルなAIへの依頼です。

[task_basic]
name = "Daily Code Review"
cron = "0 3 * * *"
prompt = "今日の変更点を要約して、改善案を箇条書きで出してください。"
provider = "claude"
# 
# --- [Pattern 2] 分類タスク + JQパース (codex_json) ---
# AIにJSON形式で出力させ、ラベル部分だけを抽出する例です。

[task_json_jq]
name = "Ticket Labeling"
cron = "*/30 * * * *"
prompt = "このIssueの内容を [bug, feature, docs] のいずれかに分類して、{\"label\": \"...\"} の形式で出力して: 'ログインできない'"
provider = "codex_json"
parser_args = ".label"
# 
# --- [Pattern 3] インラインフル指定 (グローバル設定を無視) ---
# 特定のタスクだけ独自のCLIや引数を使いたい場合、全てここで定義できます。

[task_full_inline]
name = "Custom Tool Task"
cron = "0 0 * * *"
prompt = "解析対象のテキスト"
command_template = ["my-custom-cli", "--output", "json", "--input", "{prompt}"]
parser = "jq"
parser_args = ".results[0].text"

[task_full_inline.ai]
engine = "unused_but_schema_requires"
args = ["--temperature", "0.2", "--max-tokens", "1000"]
# 
# --- [Pattern 4] 通常のShellコマンド実行 ---
# AIを使わず、単純な cron ジョブとして実行します。

[task_shell]
name = "Cleanup Logs"
cron = "0 4 * * 0"
command = "rm -rf ./logs/*.log && touch ./logs/.gitkeep"
shell = "bash"
# 
# ================================================================
#  利用可能なフィールド一覧
# ================================================================
#  name             : タスク名 (必須)
#  cron             : 実行タイミング (crontab形式, 必須)
#  prompt           : AIへの依頼内容 (AI実行時に必須)
#  provider         : 使用するAIプロバイダー (config.tomlの[providers]参照)
#  command          : 直接実行するShellコマンド (AIを使わない場合使用)
#  shell            : command実行時のシェル (デフォルト: sh)
#  command_template : インラインでのCLIビルド。{prompt} が置換される
#  parser           : 出力パーサーの種類 ('raw' or 'jq')
#  parser_args       : パーサーへの引数 (jqのクエリなど)
#  [task.ai]        : 詳細なAIエンジン設定
#    engine         : プロバイダー名の上書き
#    args           : CLIに渡す追加の引数リスト
# ================================================================
